<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUSINSA LOOK - AI 패션 코디 평가 앱</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --musinsa-black: #111111;
      --musinsa-dark-gray: #222222;
      --musinsa-light-gray: #f4f4f4;
      --musinsa-accent: #0078ff;
      --border-color: #dddddd;
      --text-main: #333333;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'Pretendard', Arial, sans-serif;
      background: var(--musinsa-light-gray); color: var(--text-main); line-height: 1.6;
    }
    .container { width: min(1100px, 95%); margin: 40px auto; padding-bottom: 80px; }

    /* 무신사 스타일 헤더 */
    header { text-align: center; margin-bottom: 35px; border-bottom: 3px solid var(--musinsa-black); padding-bottom: 15px; }
    header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin: 0 0 5px 0; text-transform: uppercase; }
    header .subtitle { color: #666; font-size: 14px; }

    /* 메인 카드 레이아웃 */
    .app-card { background: #ffffff; border-radius: 0px; padding: 30px; border: 1px solid var(--border-color); }
    .auth-box { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    
    input, select {
      height: 48px; border-radius: 0px; border: 1px solid var(--border-color); padding: 0 14px;
      font-size: 14px; background: #fff; transition: 0.2s;
    }
    input:focus, select:focus { border-color: var(--musinsa-black); outline: none; }

    /* 메인 스튜디오 구조 */
    .studio-layout { display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
    @media (max-width: 900px) { .studio-layout { grid-template-columns: 1fr; } }

    /* 무신사 카테고리 탭 */
    .category-container { margin-bottom: 20px; }
    .category-tabs { display: flex; gap: 5px; overflow-x: auto; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .tab-btn {
      padding: 10px 18px; background: #fff; border: 1px solid var(--border-color); font-weight: 700;
      font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.2s;
    }
    .tab-btn.active { background: var(--musinsa-black); color: #fff; border-color: var(--musinsa-black); }

    /* 아이템 셀렉터 그리드 */
    .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; border-left: 3px solid var(--musinsa-black); padding-left: 8px; }
    .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 25px; }
    .fashion-item {
      padding: 12px; background: #fafafa; border: 1px solid var(--border-color); font-size: 13px;
      text-align: center; cursor: pointer; font-weight: 500; transition: 0.15s;
    }
    .fashion-item:hover { background: #eee; }
    .fashion-item.active { border-color: var(--musinsa-black); background: #f0f0f0; font-weight: 700; }

    /* 컬러 그리드 파트 */
    .color-section { background: #fafafa; padding: 20px; border: 1px solid var(--border-color); display: none; margin-bottom: 25px; }
    .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
    .color-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 6px; background: #fff; border: 1px solid #eaeaea;
    }
    .color-circle { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ccc; }
    .color-name { font-size: 11px; color: #555; }

    /* 가상 옷장 사이드바 */
    .closet-sidebar { display: flex; flex-direction: column; gap: 20px; height: fit-content; position: sticky; top: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--musinsa-light-gray); padding: 12px; font-size: 13px; }
    .selected-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 60px; align-content: flex-start; }
    .selected-tag {
      display: inline-flex; align-items: center; background: var(--musinsa-black); color: #fff;
      padding: 6px 12px; font-size: 12px; font-weight: 600;
    }
    .selected-tag i { margin-left: 8px; cursor: pointer; color: #ff5252; }

    /* 상황 고정 추천 태그 */
    .situation-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sit-tag {
      background: #fff; border: 1px solid var(--border-color); padding: 5px 12px; font-size: 12px; cursor: pointer; transition: 0.15s;
    }
    .sit-tag:hover, .sit-tag.active { border-color: var(--musinsa-black); background: var(--musinsa-black); color: #fff; }

    /* 버튼 계열 */
    button { border-radius: 0px; font-family: inherit; }
    .btn-black { width: 100%; height: 50px; background: var(--musinsa-black); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; border: none; }
    .btn-black:hover { background: #333; }
    .btn-black:disabled { background: #999; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #555; border: 1px solid var(--border-color); padding: 5px 10px; font-size: 12px; cursor: pointer; }
    .delete-btn { background: #ff5252; color: #fff; border: none; padding: 4px 8px; font-size: 11px; cursor: pointer; }

    /* 결과 모듈 */
    .result-box { display: none; background: #fff; border: 2px solid var(--musinsa-black); padding: 25px; margin-top: 25px; }
    .result-title { font-size: 16px; font-weight: 900; margin-bottom: 12px; text-transform: uppercase; letter-spacing: -0.5px; }
    .result-content { font-size: 14px; color: #222; line-height: 1.7; white-space: pre-wrap; margin-bottom: 15px; background: #f9f9f9; padding: 15px; border: 1px solid #eee; }
    audio { width: 100%; }

    /* 타임라인 히스토리 */
    .history-section { margin-top: 30px; border-top: 2px dashed var(--border-color); padding-top: 25px; }
    .history-item { background: #fff; border: 1px solid var(--border-color); padding: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
    .history-info { font-size: 13px; color: #444; }

    .status { font-size: 13px; color: var(--musinsa-accent); text-align: center; font-weight: bold; margin-top: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>MUSINSA LOOK ENGINE</h1>
      <div class="subtitle">선택된 가상 옷장의 코디 벨런스를 매칭하여 AI 리포트 및 음성 피드백을 출력합니다.</div>
    </header>

    <!-- 1. 계정 인증 섹션 -->
    <section id="authSection" class="app-card">
      <div class="auth-box">
        <h3 style="text-align: center; margin: 0 0 10px 0; font-weight: 900;">MEMBER AUTHENTICATION</h3>
        <input id="emailInput" type="email" placeholder="이메일 주소" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="btn-black" id="loginBtn">로그인 (LOG IN)</button>
        <button class="btn-black" id="signupBtn" style="background:#555;">회원가입 (SIGN UP)</button>
      </div>
    </section>

    <!-- 2. 오퍼레이션 메인 워크스페이스 -->
    <section id="mainSection" class="hidden">
      <div class="studio-layout">
        
        <!-- 좌측 셀렉터 콘솔 -->
        <div class="app-card">
          <div class="category-container">
            <div class="category-tabs" id="categoryTabs">
              <button class="tab-btn active" data-cat="상의">상의</button>
              <button class="tab-btn" data-cat="하의">하의</button>
              <button class="tab-btn" data-cat="아우터">아우터</button>
              <button class="tab-btn" data-cat="신발">신발</button>
              <button class="tab-btn" data-cat="모자">모자</button>
              <button class="tab-btn" data-cat="액세서리">액세서리</button>
            </div>
          </div>

          <div class="section-title">의류 카테고리 아이템 선택</div>
          <div class="item-grid" id="itemGrid"></div>
          
          <!-- 실버, 골드를 포함한 무신사 연동 컬러 필터 -->
          <div class="color-section" id="colorSection">
            <div class="section-title">디테일 컬러 매칭 (<span id="targetItemName" style="color:var(--musinsa-accent);"></span>)</div>
            <div class="color-grid" id="colorGrid"></div>
          </div>
          
          <!-- TPO 설정 -->
          <div style="margin-top: 10px;">
            <div class="section-title">상황 / TPO 설정</div>
            <input id="situationInput" type="text" placeholder="예: 대학 대면 강의실, 첫 소개팅, 격식 있는 결혼식 하객" />
            <div class="situation-tags" id="sitTags">
              <span class="sit-tag">캠퍼스 대면 강의</span>
              <span class="sit-tag">첫 주말 소개팅</span>
              <span class="sit-tag">호텔 결혼식 하객</span>
              <span class="sit-tag">주말 한강 데이트</span>
              <span class="sit-tag">스타트업 면접 자리</span>
            </div>
          </div>
        </div>

        <!-- 우측 가상 옷장 사이드바 -->
        <div class="closet-sidebar app-card">
          <div class="top-bar">
            <div><strong>USER:</strong> <span id="userEmail" style="color:#666;"></span></div>
            <button class="btn-outline" id="logoutBtn">로그아웃</button>
          </div>

          <div class="section-title" style="margin: 5px 0 0 0;">MY VIRTUAL CLOSET</div>
          <div id="selectedContainer" class="selected-list">
            <p style="color: #888; font-size: 12px; margin: 0;">아이템과 컬러를 선택해 옷장을 채워주세요.</p>
          </div>

          <div style="margin-top: 10px;">
            <div class="section-title">AI VOICE BRAND</div>
            <select id="voiceSelect" style="width: 100%;">
              <option value="nova">Nova (부드러운 여성 스타일리스트)</option>
              <option value="alloy">Alloy (명쾌하고 정교한 트렌드 세터)</option>
              <option value="onyx">Onyx (차분하고 묵직한 디자이너)</option>
              <option value="shimmer">Shimmer (감각적이고 세련된 크리틱)</option>
            </select>
          </div>

          <button class="btn-black" id="evaluateBtn" style="margin-top:10px;">스타일 평가받기 (TTS 재생)</button>
          <div id="status" class="status"></div>
        </div>

      </div>

      <!-- 리포트 스크린 코어 -->
      <div id="resultBox" class="result-box">
        <div class="result-title">⚡ EDITORIAL AI COORD REPORT</div>
        <div id="resultContent" class="result-content"></div>
        <audio id="audioPlayer" controls autoplay></audio>
      </div>

      <!-- 타임라인 데이터베이스 피드 -->
      <div class="history-section app-card" style="margin-top: 30px;">
        <div class="result-title" style="border:none; margin-bottom:15px;">📜 ARCHIVE LOOKS</div>
        <div id="historyList" class="history-list"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, remove, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // 기존에 제공해주신 주소 그대로 유지 연동 완료
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWAeevqRDsS91-klK2ao-k6S7R0SB4jEwHBGPSEukOQq3kCPtc5bmYkFaQ9uDtMaQr/exec';

    const firebaseConfig = {
      apiKey: "AIzaSyBVeHOtbK6HgclpIx3a3GwfFfoBnAUJn_g",
      authDomain: "baeseung-ccd19.firebaseapp.com",
      databaseURL: "https://baeseung-ccd19-default-rtdb.firebaseio.com",
      projectId: "baeseung-ccd19",
      storageBucket: "baeseung-ccd19.firebasestorage.app",
      messagingSenderId: "660051676205",
      appId: "1:660051676205:web:8ca691620cb44c5d6fbca4",
      measurementId: "G-FQZBVH3400"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    const fashionData = {
      "상의": ["반팔 티셔츠", "긴팔 티셔츠", "셔츠", "블라우스", "니트 스웨터", "맨투맨", "후드티", "카라티", "가디건"],
      "하의": ["청바지", "슬랙스", "면바지", "반바지", "조거 팬츠", "와이드 데님", "카고 팬츠", "스커트"],
      "아우터": ["롱 코트", "패딩 점퍼", "트위드 자켓", "가죽 자켓", "블레이저", "트렌치 코트", "윈드브레이커"],
      "신발": ["스니커즈", "캔버스화", "더비 슈즈", "로퍼", "워커 부츠", "샌들", "힐 구두"],
      "모자": ["볼캡 모자", "비니", "버킷햇", "페도라", "베레모"],
      "액세서리": ["체인 목걸이", "가죽 팔찌", "반지 세트", "메탈 시계", "가죽 벨트", "숄더 백", "백팩"]
    };

    const colorPalette = [
      { name: "블랙", hex: "#111111" }, { name: "화이트", hex: "#ffffff" },
      { name: "그레이", hex: "#888888" }, { name: "네이비", hex: "#0f1e36" },
      { name: "베이지", hex: "#f5f5dc" }, { name: "브라운", hex: "#5d4037" },
      { name: "카키", hex: "#4b5320" }, { name: "와인", hex: "#722f37" },
      { name: "블루", hex: "#2196f3" }, { name: "실버", hex: "#cccccc" }, { name: "골드", hex: "#e5c158" }
    ];

    let selectedItems = [];
    let currentPendingItem = "";
    let currentUser = null;
    let dbRef = null;

    function renderItems(category) {
      const grid = document.getElementById('itemGrid');
      grid.innerHTML = '';
      fashionData[category].forEach(item => {
        const div = document.createElement('div');
        div.className = `fashion-item ${currentPendingItem === item ? 'active' : ''}`;
        div.textContent = item;
        div.onclick = () => {
          currentPendingItem = item;
          document.getElementById('targetItemName').textContent = item;
          document.getElementById('colorSection').style.display = 'block';
          renderItems(category);
          renderColors();
        };
        grid.appendChild(div);
      });
    }

    function renderColors() {
      const colorGrid = document.getElementById('colorGrid');
      colorGrid.innerHTML = '';
      colorPalette.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-btn';
        div.innerHTML = `
          <div class="color-circle" style="background-color: ${color.hex}"></div>
          <div class="color-name">${color.name}</div>
        `;
        div.onclick = () => {
          if(!currentPendingItem) return;
          const combined = `${color.name} ${currentPendingItem}`;
          if(!selectedItems.includes(combined)) {
            selectedItems.push(combined);
            updateClosetUI();
          }
          currentPendingItem = "";
          document.getElementById('colorSection').style.display = 'none';
          renderItems(document.querySelector('.tab-btn.active').dataset.cat);
        };
        colorGrid.appendChild(div);
      });
    }

    function updateClosetUI() {
      const container = document.getElementById('selectedContainer');
      if(selectedItems.length === 0) {
        container.innerHTML = '<p style="color: #888; font-size: 12px; margin: 0;">아이템과 컬러를 선택해 옷장을 채워주세요.</p>';
        return;
      }
      container.innerHTML = selectedItems.map(item => `
        <span class="selected-tag">${item} <i class="fas fa-times" onclick="removeTag('${item}')"></i></span>
      `).join('');
    }

    window.removeTag = (item) => {
      selectedItems = selectedItems.filter(i => i !== item);
      updateClosetUI();
      renderItems(document.querySelector('.tab-btn.active').dataset.cat);
    };

    document.getElementById('categoryTabs').onclick = (e) => {
      if(!e.target.classList.contains('tab-btn')) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderItems(e.target.dataset.cat);
    };

    document.getElementById('sitTags').onclick = (e) => {
      if(!e.target.classList.contains('sit-tag')) return;
      document.querySelectorAll('.sit-tag').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('situationInput').value = e.target.textContent;
    };

    // Firebase 가동부 복구 연동
    document.getElementById('signupBtn').onclick = async () => {
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      if(!email || !pass) return alert('필수 항목 기입 누락.');
      try { await createUserWithEmailAndPassword(auth, email, pass); alert('가입 완료.'); } catch(e) { alert(e.message); }
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      if(!email || !pass) return alert('필수 항목 기입 누락.');
      try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        document.getElementById('userEmail').textContent = user.email;
        renderItems("상의");
        startDataSync(user.uid);
      } else {
        currentUser = null;
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('mainSection').classList.add('hidden');
        if(dbRef) off(dbRef);
      }
    });

    // 가상 옷장 기반의 데이터 전송 제어 허브
    document.getElementById('evaluateBtn').onclick = async () => {
      const situation = document.getElementById('situationInput').value.trim();
      if(selectedItems.length === 0 || !situation) return alert("옷장의 의류 세트와 TPO 상황 설정을 모두 마쳐주세요!");

      const evaluateBtn = document.getElementById('evaluateBtn');
      const statusBox = document.getElementById('status');
      const resultBox = document.getElementById('resultBox');

      try {
        evaluateBtn.disabled = true;
        evaluateBtn.textContent = '무신사 AI 코디 리포트 추출 중...';
        statusBox.textContent = '연동된 구글 서버 엔진을 통해 가상 패션 피드백을 수신하고 있습니다.';
        resultBox.style.display = 'none';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'evaluate',
            clothes: selectedItems.join(", "),
            situation: situation,
            voice: document.getElementById('voiceSelect').value
          })
        });

        const data = await response.json();
        if(data.error) throw new Error(data.error);

        document.getElementById('resultContent').textContent = data.evaluation;
        document.getElementById('audioPlayer').src = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        resultBox.style.display = 'block';
        statusBox.textContent = '분석 리포트 갱신 및 음성 가이드를 재생합니다.';

        // 데이터 백업 컴파일링
        if(currentUser) {
          const { ref: fRef, push: fPush, set: fSet } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
          await fSet(fPush(ref(database, `users/${currentUser.uid}/history`)), {
            clothes: selectedItems.join(", "),
            situation,
            evaluation: data.evaluation,
            date: new Date().toLocaleString('ko-KR')
          });
        }
      } catch (err) {
        console.error(err);
        statusBox.textContent = '평가 거부 처리됨';
        alert('에러 알림: ' + err.message + "\n구글 앱스 스크립트가 '새 배포' 상태 및 OpenAI API Key 자격을 갖고 있는지 체크하세요.");
      } finally {
        evaluateBtn.disabled = false;
        evaluateBtn.textContent = '스타일 평가받기 (TTS 재생)';
      }
    };

    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) { byteNumbers[i] = slice.charCodeAt(i); }
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }

    function startDataSync(uid) {
      dbRef = ref(database, `users/${uid}/history`);
      onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        if(!data) { list.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">저장 내역이 존재하지 않습니다.</div>'; return; }
        Object.entries(data).reverse().forEach(([id, item]) => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
            <div class="history-info">
              <strong>👕 옷장 세트:</strong> ${item.clothes}<br>
              <strong>📍 TPO 목적지:</strong> ${item.situation}<br>
              <strong>💬 AI 분석:</strong> ${item.evaluation}<br>
              <span style="font-size:11px; color:#aaa;">${item.date}</span>
            </div>
            <button class="delete-btn" data-id="${id}">삭제</button>
          `;
          div.querySelector('.delete-btn').onclick = async (e) => {
            if(confirm('이 리포트 기록을 데이터베이스에서 삭제하시겠습니까?')) {
              await remove(ref(database, `users/${uid}/history/${e.target.dataset.id}`));
            }
          };
          list.appendChild(div);
        });
      });
    }
  </script>

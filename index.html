<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE AI CLOSET - 프리미엄 패션 진단</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a1a;
      --accent: #d4af37; /* Gold */
      --bg: #f8f9fa;
      --card-bg: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg); color: var(--primary); line-height: 1.6;
    }

    .container { width: min(1000px, 95%); margin: 40px auto; padding-bottom: 100px; }

    /* 고급스러운 헤더 */
    header { text-align: center; margin-bottom: 50px; }
    header h1 { font-size: 32px; letter-spacing: 4px; font-weight: 800; margin-bottom: 10px; }
    header p { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

    /* 로그인 섹션 */
    .glass-card {
      background: var(--card-bg); border-radius: 30px; padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }
    .auth-box { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    input, select {
      height: 55px; border-radius: 15px; border: 1px solid #eee; padding: 0 20px;
      font-size: 16px; background: #fff; transition: 0.3s;
    }
    input:focus { border-color: var(--accent); outline: none; }

    /* 메인 앱 레이아웃 */
    .app-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
    @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } }

    /* 카테고리 탭 */
    .category-container { margin-bottom: 30px; }
    .category-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 20px; background: #fff; border: 1px solid #eee; border-radius: 50px;
      white-space: nowrap; cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* 아이템 그리드 */
    .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .fashion-item {
      padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 18px;
      text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    .fashion-item:hover { border-color: var(--accent); }
    .fashion-item.selected { background: #fffbeb; border-color: var(--accent); color: var(--accent); font-weight: bold; }

    /* 선택된 옷장 사이드바 */
    .closet-sidebar { position: sticky; top: 20px; height: fit-content; }
    .closet-title { font-weight: 800; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .selected-list { list-style: none; padding: 0; margin-bottom: 25px; }
    .selected-tag {
      display: inline-flex; align-items: center; background: #eee; padding: 6px 12px;
      border-radius: 8px; margin: 4px; font-size: 13px;
    }
    .selected-tag i { margin-left: 8px; cursor: pointer; color: #f44336; }

    /* 버튼 스타일 */
    .btn {
      width: 100%; height: 60px; border-radius: 15px; border: none; font-size: 16px;
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-gold { background: var(--accent); color: white; margin-top: 20px; }
    .btn-dark { background: var(--primary); color: white; }
    
    /* 결과 박스 */
    #resultBox { display: none; margin-top: 30px; animation: fadeInUp 0.5s ease; }
    .result-card { background: #fff; border-left: 5px solid var(--accent); padding: 25px; border-radius: 20px; }
    .tts-btn {
      display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px;
      background: #f0f0f0; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 600;
    }
    .tts-btn:hover { background: #e0e0e0; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>LUXE CLOSET</h1>
      <p>AI Premium Fashion Analysis</p>
    </header>

    <section id="authSection" class="glass-card">
      <div class="auth-box">
        <h2 style="text-align:center; margin-bottom:20px;">Welcome</h2>
        <input id="emailInput" type="email" placeholder="Email Address" />
        <input id="passwordInput" type="password" placeholder="Password" />
        <button class="btn btn-dark" id="loginBtn">LOG IN</button>
        <button class="btn" id="signupBtn" style="color: #666;">SIGN UP</button>
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="app-layout">
        <div class="glass-card">
          <div class="category-container">
            <div class="category-tabs" id="categoryTabs">
              <button class="tab-btn active" data-cat="상의">상의</button>
              <button class="tab-btn" data-cat="하의">하의</button>
              <button class="tab-btn" data-cat="아우터">아우터</button>
              <button class="tab-btn" data-cat="신발">신발</button>
              <button class="tab-btn" data-cat="모자">모자</button>
              <button class="tab-btn" data-cat="액세서리">액세서리</button>
            </div>
            <div class="item-grid" id="itemGrid">
              </div>
          </div>
          
          <div style="margin-top: 40px;">
            <label style="font-weight: 800; display: block; margin-bottom: 10px;">어떤 상황에 입으시나요?</label>
            <input id="situationInput" type="text" placeholder="예: 한강 데이트, 소개팅, 격식 있는 결혼식" style="width: 100%;" />
          </div>
        </div>

        <div class="closet-sidebar glass-card">
          <div class="closet-title"><i class="fas fa-tshirt"></i> My Closet</div>
          <div id="selectedContainer" class="selected-list">
            <p style="color: #999; font-size: 14px;">아이템을 선택해주세요.</p>
          </div>
          
          <select id="voiceSelect" style="width: 100%; margin-bottom: 10px;">
            <option value="nova">Nova (세련된 여성)</option>
            <option value="alloy">Alloy (깔끔한 중성)</option>
            <option value="onyx">Onyx (차분한 남성)</option>
          </select>
          
          <button class="btn btn-gold" id="evaluateBtn">진단 시작하기</button>
          <button class="btn" id="logoutBtn" style="margin-top: 10px; font-size: 13px; color:#888;">로그아웃</button>
        </div>
      </div>

      <div id="resultBox">
        <div class="result-card">
          <h3 style="margin-top:0;"><i class="fas fa-magic" style="color:var(--accent);"></i> 스타일리스트 AI 진단 결과</h3>
          <div id="resultContent" style="font-size: 16px; color:#444;"></div>
          
          <div id="ttsPlayBtn" class="tts-btn">
            <i class="fas fa-volume-up"></i> 평가 음성 듣기
          </div>
          <audio id="audioPlayer" class="hidden"></audio>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // 1. 설정 정보 (본인 것으로 수정)
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznWJkBxB_S2t__XRfQTOXxJTrRBDZVWooAdyO6NPp02pXzDqV8mEdvWe1eDOnh2_IAIQ/exec';
    const firebaseConfig = {
      apiKey: "AIzaSyBVeHOtbK6HgclpIx3a3GwfFfoBnAUJn_g",
      authDomain: "baeseung-ccd19.firebaseapp.com",
      databaseURL: "https://baeseung-ccd19-default-rtdb.firebaseio.com",
      projectId: "baeseung-ccd19",
      storageBucket: "baeseung-ccd19.firebasestorage.app",
      appId: "1:660051676205:web:8ca691620cb44c5d6fbca4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // 2. 패션 데이터 (카테고리당 20개)
    const fashionData = {
      "상의": ["반팔 티셔츠", "긴팔 티셔츠", "셔츠", "블라우스", "니트", "맨투맨", "후드티", "피케 셔츠", "민소매", "터틀넥", "스트라이프 티", "체크 셔츠", "옥스포드 셔츠", "데님 셔츠", "린넨 셔츠", "V넥 니트", "가디건", "크롭탑", "오버핏 티셔츠", "헨리넥 티"],
      "하의": ["청바지", "슬랙스", "면바지", "반바지", "조거 팬츠", "와이드 팬츠", "카고 팬츠", "린넨 바지", "스커트", "롱 스커트", "미니 스커트", "데님 스커트", "치노 팬츠", "레깅스", "트레이닝 바지", "부츠컷 팬츠", "스트레이트 진", "생지 데님", "코듀로이 바지", "테이퍼드 팬츠"],
      "아우터": ["코트", "패딩", "자켓", "블레이저", "가죽 자켓", "청자켓", "항공 점퍼", "트렌치 코트", "바람막이", "후드 집업", "무스탕", "가디건(아우터)", "야상", "뽀글이 플리스", "더플 코트", "집업 니트", "MA-1", "슈트 상의", "베스트(조끼)", "경량 패딩"],
      "신발": ["운동화", "스니커즈", "구두", "로퍼", "부츠", "샌들", "슬리퍼", "워커", "첼시 부츠", "단화", "러닝화", "어글리 슈즈", "캔버스화", "옥스퍼드화", "더비 슈즈", "뮬", "하이힐", "플랫 슈즈", "레인 부츠", "슬립온"],
      "모자": ["볼캡", "비니", "버킷햇", "페도라", "베레모", "헌팅캡", "캡모자", "비치햇", "보닛", "스냅백", "캠프캡", "뉴스보이캡", "벙거지 모자", "털모자", "썬캡", "밀짚모자", "니트 비니", "와치캡", "보울러", "파나마 햇"],
      "액세서리": ["목걸이", "팔찌", "반지", "귀걸이", "시계", "벨트", "넥타이", "스카프", "머플러", "장갑", "안경", "선글라스", "크로스백", "백팩", "토트백", "숄더백", "클러치", "에코백", "양말", "브로치"]
    };

    let selectedItems = [];

    // 3. UI 렌더링 로직
    function renderItems(category) {
      const grid = document.getElementById('itemGrid');
      grid.innerHTML = '';
      fashionData[category].forEach(item => {
        const div = document.createElement('div');
        div.className = `fashion-item ${selectedItems.includes(item) ? 'selected' : ''}`;
        div.textContent = item;
        div.onclick = () => toggleItem(item);
        grid.appendChild(div);
      });
    }

    function toggleItem(item) {
      if (selectedItems.includes(item)) {
        selectedItems = selectedItems.filter(i => i !== item);
      } else {
        if (selectedItems.length >= 8) return alert("최대 8개까지만 선택 가능합니다.");
        selectedItems.push(item);
      }
      updateClosetUI();
      const activeCat = document.querySelector('.tab-btn.active').dataset.cat;
      renderItems(activeCat);
    }

    function updateClosetUI() {
      const container = document.getElementById('selectedContainer');
      if (selectedItems.length === 0) {
        container.innerHTML = '<p style="color: #999; font-size: 14px;">아이템을 선택해주세요.</p>';
        return;
      }
      container.innerHTML = selectedItems.map(item => `
        <span class="selected-tag">${item} <i class="fas fa-times" onclick="removeTag('${item}')"></i></span>
      `).join('');
    }

    window.removeTag = (item) => {
      selectedItems = selectedItems.filter(i => i !== item);
      updateClosetUI();
      const activeCat = document.querySelector('.tab-btn.active').dataset.cat;
      renderItems(activeCat);
    };

    // 탭 클릭 이벤트
    document.getElementById('categoryTabs').onclick = (e) => {
      if (!e.target.classList.contains('tab-btn')) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderItems(e.target.dataset.cat);
    };

    // 4. 기능 로직 (진단 및 TTS)
    const evaluateBtn = document.getElementById('evaluateBtn');
    const ttsPlayBtn = document.getElementById('ttsPlayBtn');
    const audioPlayer = document.getElementById('audioPlayer');
    let currentAudioBase64 = "";

    evaluateBtn.onclick = async () => {
      const situation = document.getElementById('situationInput').value;
      if (selectedItems.length === 0 || !situation) return alert("옷을 선택하고 상황을 입력하세요!");

      evaluateBtn.disabled = true;
      evaluateBtn.textContent = "AI 분석 중...";
      document.getElementById('resultBox').style.display = 'none';

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'evaluate',
            clothes: selectedItems.join(", "),
            situation: situation,
            voice: document.getElementById('voiceSelect').value
          })
        });
        const data = await res.json();
        
        document.getElementById('resultContent').innerText = data.evaluation;
        currentAudioBase64 = data.audioBase64;
        document.getElementById('resultBox').style.display = 'block';
        
        // Firebase 저장
        const uid = auth.currentUser.uid;
        push(ref(database, `users/${uid}/history`), {
          clothes: selectedItems.join(", "),
          situation: situation,
          evaluation: data.evaluation,
          date: new Date().toLocaleString()
        });

      } catch (e) { alert("오류 발생!"); }
      finally {
        evaluateBtn.disabled = false;
        evaluateBtn.textContent = "진단 시작하기";
      }
    };

    // 음성 듣기 버튼 클릭 시
    ttsPlayBtn.onclick = () => {
      if (!currentAudioBase64) return;
      const audioUrl = `data:audio/mp3;base64,${currentAudioBase64}`;
      audioPlayer.src = audioUrl;
      audioPlayer.play();
    };

    // 5. 인증 로직
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        renderItems("상의");
      } else {
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('mainSection').classList.add('hidden');
      }
    });

    document.getElementById('loginBtn').onclick = () => {
      signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value);
    };
    document.getElementById('signupBtn').onclick = () => {
      createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value);
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

  </script>
</body>
</html>
